<html>
    <head>
        <title>HTML CSS Ex9</title>
    </head>

    <body>
        <h1>HTML Form Controls</h1>
        <hr>

        <div>
            <br/><br/> Textbox              : <input type="text" />
            <br/><br/> Email                : <input type="email" />
            <br/><br/> Password             : <input type="password" />
            <br/><br/> Date                 : <input type="date" />
            <br/><br/> Time                 : <input type="time" />
            <br/><br/> Color                : <input type="color" />
            <br/><br/> Button Tag           : <button>Search <i class="fa-solid fa-magnifying-glass" style="color: rgb(222, 2, 2);"></i> </button>
            <br/><br/> Input Button         : <input type="button" value="Click Here" />
            <br/><br/> Submit Button        : <input type="submit" value="Submit" />

            <br/><br/> Radio Button         : <input type="radio" name="coding" value="Python"  id="r1"/>
                                              <label for="r1">Python</label> 
                                              
                                              <input type="radio" name="coding" value="SQL"  id="r2"/>
                                              <label for="r2">SQL</label> 

                                              <input type="radio" name="coding" value="Java"  id="r3"/>
                                              <label for="r3">Java</label> 

                                              <input type="radio" name="coding" value="Swift UI"  id="r4"/>
                                              <label for="r4">Swift UI</label> 

                                              <input type="radio" name="coding" value="Dart Programming" id="r5"/>
                                              <label for="r5">Dart Programming</label> 

            <br/><br/> Checkbox             : <input type="checkbox"  id="c1" />
                                              <label for="c1">Cold Drink</label>

                                              <input type="checkbox"  id="c2" />
                                              <label for="c2">Pizza</label>

                                              <input type="checkbox"  id="c3" />
                                              <label for="c3">Burger</label>

                                              <input type="checkbox"  id="c4" />
                                              <label for="c4">Coffee</label>

                                               <!-- accept="image/*"   accept="application/pdf"  -->
            <br/><br/> File Upload          : <input type="file" accept="image/*" />


            <br/><br/> Select Box           : <select>
                                                    <option>Pune</option>
                                                    <option>Hyderabad</option>
                                                    <option>Chennai</option>
                                                    <option>Bengaluru</option>
                                                    <option>Kolkata</option>
                                              </select>

        </div>










        <script src="https://kit.fontawesome.com/6ca4e8a325.js" crossorigin="anonymous"></script>
    </body>
</html>
