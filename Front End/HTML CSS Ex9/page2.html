<html>
    <head>
        <title>HTML CSS Ex9</title>
        <link rel="stylesheet" href="./css/style.css" />
    </head>

    <body>
        <h1>HTML Login Form</h1>
        <hr>

        <div class="card">
            <div class="login-header">
                <h1>Login Here!</h1>
            </div>

            <div class="login-body">
                <p class="form-label">Email <i class="fa-regular fa-envelope fa-beat" style="color: rgb(222, 2, 2);"></i></p>
                <input type="email" placeholder="someone@gmail.com" class="form-control" />

                <p class="form-label">Password <i class="fa-solid fa-unlock fa-beat" style="color: rgb(222, 2, 2);"></i></p>
                <input type="password" placeholder="secret" class="form-control" />
            </div>

            <div class="login-footer">
                <button class="btn">Sign In</button>
            </div>
        </div>



        <script src="https://kit.fontawesome.com/6ca4e8a325.js" crossorigin="anonymous"></script>
    </body>
</html>
