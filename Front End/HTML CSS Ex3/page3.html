<html>

<head>
    <title>HTML CSS Ex3</title>

    <style>
        li{
            border:1px solid;
            width:150px;
            padding:10px;
            margin:10px;
            text-align: center;
            display: inline-block;
            background-color: darkred;
            color:white;
        }

        li:hover{
            color:yellow;
        }

        ul{
            list-style: none;
            padding:0px;
        }
    </style>
</head>

<body>
    <div style="font-family: 'comic sans ms';">
        <h1>List Items and Styles</h1>
        <hr>

        <ul>
            <li>Home</li>
            <li>Menus</li>
            <li>Reservation</li>
            <li>Contact Us</li>
            <li>Help!</li>
        </ul>


    </div>
</body>

</html>
