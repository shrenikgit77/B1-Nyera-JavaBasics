<html>
    <head>
        <title>JavaScript Ex1</title>
    </head>

    <body>
        <h1>JavaScript Output Functions</h1>
        <hr>

        <button onclick="show1()">Console Output</button>
        <button onclick="show2()">Alert</button>
        <button onclick="show3()">Document Write</button>


        <script>
            function show1()
            {
                console.log("Hello Javascript");
            }

            function show2()
            {
                alert("Hello Javascript");
            }

            function show3()
            {
                document.write('<h1 style="color:red;">Hello JavaScript</h1>');
            }
        </script>
    </body>
</html>
