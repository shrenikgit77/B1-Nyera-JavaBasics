<html>
    <head>
        <title>JavaScript Ex1</title>

        <style>
            .box{
                margin:10px;
                padding:5px;

            }
        </style>
    </head>

    <body>
        <h1>JavaScript Calculator</h1>
        <hr>

        <div class="box">
            <input type="text" id="num1" placeholder="number1" />
            <input type="text" id="num2" placeholder="number2" />

            <div class="box">
                <button onclick="add()">Addition</button>
                <button onclick="subt()">Subtraction</button>
                <button onclick="mult()">Multiplication</button>
                <button onclick="div()">Division</button>
            </div>
        </div>


        <script>
            function add()
            {
                var a = Number(document.getElementById("num1").value); //"10"
                var b = Number(document.getElementById("num2").value); //"56"

                var ans = a + b;
                console.log("Addition = " + ans);
            }

            function subt()
            {
                var a = document.getElementById("num1").value;
                var b = document.getElementById("num2").value;

                var ans = a - b;
                console.log("Subtraction = " + ans);
            }

            function mult()
            {
                var a = document.getElementById("num1").value;
                var b = document.getElementById("num2").value;

                var ans = a * b;
                console.log("Multiplication = " + ans);
            }

            function div()
            {
                var a = document.getElementById("num1").value;
                var b = document.getElementById("num2").value;

                var ans = a / b;
                console.log("Division = " + ans);
            }
        </script>
    </body>
</html>
